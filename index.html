<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intendry — From intent to software.</title>
  <meta name="description" content="An intent-driven software forge. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0a0a0f;
      --surface:    #13111a;
      --border:     #1e1a2e;
      --violet:     #7c3aed;
      --violet-mid: #9b6ef3;
      --violet-soft:#c4a0ff;
      --text:       #e8e0ff;
      --muted:      #6b5f8a;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(155,110,243,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    /* Logo placeholder — replace src with your actual logo */
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    /* Fallback monogram if no image */
    .logo-fallback {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 500;
      color: var(--violet-soft);
      letter-spacing: -0.04em;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .divider {
      width: 1px;
      height: 1rem;
      background: var(--border);
      margin: 0 auto;
    }

    .tagline {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .description {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      font-weight: 300;
      max-width: 360px;
    }

    .description strong {
      color: var(--violet-soft);
      font-weight: 400;
    }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--violet);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* Contact link */
    .contact {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .contact a {
      color: var(--violet-soft);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact a:hover {
      color: var(--text);
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--border);
      letter-spacing: 0.08em;
    }

    @media (prefers-reduced-motion: reduce) {
      .status-dot { animation: none; }
    }

    @media (max-width: 480px) {
      .wordmark { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">
      <!-- Replace the line below with: <img src="logo.jpg" alt="Intendry"> -->
      <span class="logo-fallback">I</span>
    </div>

    <div>
      <div class="wordmark">intendry</div>
    </div>

    <div class="tagline">From intent to software.</div>

    <div class="divider"></div>

    <p class="description">
      An <strong>intent-driven software forge</strong> —
      where BDD and structured prompts preserve what the software was meant to do,
      from the first conversation to the last commit.
    </p>

    <div class="status">
      <span class="status-dot"></span>
      building in public — work in progress
    </div>

    <div class="contact">
      <a href="mailto:gael@intendry.dev">gael@intendry.dev</a>
    </div>
  </main>

  <footer>© 2026 Gaël Thouvenin — intendry.dev</footer>
</body>
</html>
